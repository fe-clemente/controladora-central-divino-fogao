<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Sistemas — Divino Fogão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/global.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Divino Fogão"
         onerror="this.style.display='none';document.querySelector('.logo-fb').style.display='block'">
    <span class="logo-fb">🍽️</span>
  </div>
  <div class="hd"></div>
  <div class="h-title">Central de Sistemas</div>
  <div class="h-user" style="margin-left:auto;display:flex;align-items:center;gap:10px;">
    <img class="h-foto" id="userFoto" src="" alt=""
         style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border);object-fit:cover;display:none;">
    <span class="h-nome" id="userName" style="font-size:12px;font-weight:700;color:var(--muted);">—</span>
    <a href="/logout" class="btn btn-ghost btn-sm">🚪 Sair</a>
  </div>
</header>

<div id="statusBar">
  <div class="sdot" id="sdot"></div>
  <span id="statusTxt">Verificando sessão...</span>
  <span style="margin-left:auto;font-family:var(--font-mono);font-size:11px;" id="footerHora"></span>
</div>

<div id="loading" style="display:flex;align-items:center;justify-content:center;min-height:50vh;flex-direction:column;gap:14px;color:var(--muted);">
  <div class="spinner" style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--jur);border-radius:50%;"></div>
  <span style="font-size:13px">Carregando sistemas...</span>
</div>

<div id="content" style="display:none;">

  <div class="hero">
    <div class="hero-inner">
      <div class="hero-label">Divino Fogão · Central de Sistemas</div>
      <h1>Olá, <span id="heroNome">—</span> 👋</h1>
      <p class="hero-sub">Selecione um módulo abaixo para acessar o sistema.</p>
    </div>
  </div>

  <main>
    <div class="sec-hdr" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div class="page-title" style="font-size:13px;">📦 Módulos disponíveis</div>
      <div class="mono" id="secCount"></div>
    </div>
    <div class="modules-grid" id="modulesGrid"></div>
  </main>

</div>

<footer style="text-align:center;padding:24px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);margin-top:20px;font-family:var(--font-mono);">
  Divino Fogão © 2026 — T.I.
</footer>

<script>
const MODULOS = [
  { id:'ti',          nome:'T.I.',               desc:'Ativos, projetos, chamados, migração e controle de equipamentos.', icon:'🖥️', href:'/ti',          tag:'Tecnologia', accent:'#0369a1' },
  { id:'treinamento', nome:'Treinamento & Dev.',  desc:'Chamados T&D, turnover, universidade corporativa e SULTS.',        icon:'🎓', href:'/treinamento',  tag:'T&D',        accent:'#7c3aed' },
  { id:'suprimentos', nome:'Suprimentos',         desc:'Gestão de compras, fornecedores e controle de estoque.',           icon:'📦', href:'/suprimentos',  tag:'Compras',    accent:'#16a34a' },
  { id:'marketing',   nome:'Marketing',           desc:'Campanhas, materiais e indicadores de comunicação.',               icon:'📣', href:'/marketing',    tag:'Marketing',  accent:'#c8102e' },
  { id:'juridico',    nome:'Jurídico',            desc:'Ativos, comodatos, distratados e inventário do departamento jurídico.', icon:'⚖️', href:'/juridico', tag:'Jurídico',   accent:'#7c3aed' },
];

const $ = id => document.getElementById(id);

setInterval(() => {
  $('footerHora').textContent = new Date().toLocaleTimeString('pt-BR');
}, 1000);

async function init() {
  try {
    const res  = await fetch('/auth/me');
    const data = await res.json();
    if (!data.logado) { location.href = '/login'; return; }

    const user     = data.usuario;
    const modulos  = user.modulos || [];
    const isMaster = user.isMaster || modulos.includes('master');

    $('userName').textContent = user.nome || user.email;
    $('heroNome').textContent = (user.nome || '').split(' ')[0] || user.email;
    if (user.foto) { const f = $('userFoto'); f.src = user.foto; f.style.display = 'block'; }

    const grid = $('modulesGrid');
    let comAcesso = 0;

    MODULOS.forEach(mod => {
      const tem = isMaster || modulos.includes(mod.id);
      if (tem) comAcesso++;
      const el = document.createElement(tem ? 'a' : 'div');
      if (tem) el.href = mod.href;
      el.className = 'module-card' + (tem ? '' : ' bloqueado');
      el.style.setProperty('--card-accent', mod.accent);
      el.innerHTML = `
        <div class="card-icon">${mod.icon}</div>
        <div class="card-body">
          <div class="card-nome">${mod.nome}</div>
          <div class="card-desc">${mod.desc}</div>
        </div>
        <div class="card-footer">
          <span class="card-tag${tem ? '' : ' lock'}">${tem ? mod.tag : '🔒 Sem acesso'}</span>
          ${tem ? '<span class="card-arrow">→</span>' : ''}
        </div>`;
      grid.appendChild(el);
    });

    if (isMaster) {
      const m = document.createElement('a');
      m.href = '/master.html';
      m.className = 'module-card master-card';
      m.style.setProperty('--card-accent', '#7c3aed');
      m.innerHTML = `
        <div class="card-icon">⚡</div>
        <div class="card-body">
          <div class="card-nome">Painel Master</div>
          <div class="card-desc">Gestão de usuários, permissões, logs de acesso e status de todos os sistemas.</div>
        </div>
        <div class="card-footer">
          <span class="card-tag" style="background:#ede9fe;color:#7c3aed">Master</span>
          <span class="card-arrow" style="color:#7c3aed">→</span>
        </div>`;
      grid.appendChild(m);
    }

    $('secCount').textContent = `${comAcesso} de ${MODULOS.length} disponíveis`;
    $('sdot').className = 'sdot ready';
    $('statusTxt').textContent = `Sessão ativa — ${user.email}`;
    $('loading').style.display = 'none';
    $('content').style.display = 'block';

  } catch (e) {
    $('sdot').className = 'sdot error';
    $('statusTxt').textContent = 'Erro ao carregar sessão';
    $('loading').innerHTML = `
      <p style="color:#c8102e;font-weight:700">Erro ao carregar</p>
      <a href="/login" style="color:#7c3aed;font-size:13px;font-weight:700">Fazer login novamente</a>`;
  }
}

init();
</script>
</body>
</html>
