<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links & Recursos — Jurídico</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/global.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="Divino Fogão" onerror="this.style.display='none';document.querySelector('.logo-fb').style.display='block'">
        <span class="logo-fb">🍽️</span>
    </div>
    <div class="hd"></div>
    <div class="h-title">Juridico & Dev.</div>
    <nav>
        <button class="nav-btn" onclick="location.href='/juridico/'">📊 Dashboard</button>
        <button class="nav-btn" onclick="location.href='/juridico/ativos'">📋 Comodatos Jurídico</button>
        <button class="nav-btn" onclick="location.href='/juridico/controle-equipamentos'">📋 Ativos Central</button>
        <button class="nav-btn active" onclick="location.href='/juridico/links'">🔗 Links</button>
        <button class="nav-btn" onclick="location.href='/juridico/sults'">🏪 Sults (lojas - Funcionários)</button>
        <button class="nav-btn" onclick="location.href='/juridico/uploads'">📁 Uploads</button>
    </nav>
</header>

<div id="statusBar">
    <div class="sdot" id="sdot"></div>
    <span id="statusText">Carregando links...</span>
    <span style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <span class="sheets-badge" id="sheetsBadge" style="display:none"><span>📊</span> Google Sheets</span>
        <span id="lastSync" style="font-size:11px;color:var(--muted)"></span>
        <button class="btn btn-ghost" id="btnSync" onclick="sincronizar()" style="font-size:12px">🔄 Sincronizar</button>
        <button class="btn btn-td" onclick="abrirModal()">+ Novo Link</button>
    </span>
</div>

<main>
    <div class="page-header">
        <div>
            <div class="page-title">🔗 Links & Recursos — Juridico</div>
            <div class="page-sub" id="pageSub">Sistemas, planilhas, manuais e portais do setor</div>
        </div>
        <div>
            <a href="https://docs.google.com/spreadsheets/d/1HCv-aizjWCU9AfA_cdmCXkSEd5Vtkwi7Ga-tmteJyZs/edit?gid=255138703#gid=255138703" target="_blank" class="btn btn-green" style="font-size:12px">📊 Abrir Planilha</a>
        </div>
    </div>

    <div class="sheets-info-bar" id="sheetsInfoBar" style="display:none">
        <span>📊</span>
        <span>Links sincronizados com o Google Sheets — aba LINK_JURIDICO —
            <a href="https://docs.google.com/spreadsheets/d/1HCv-aizjWCU9AfA_cdmCXkSEd5Vtkwi7Ga-tmteJyZs/edit?gid=255138703#gid=255138703" target="_blank">abrir planilha</a>
        </span>
        <span id="sheetsTotal" style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px"></span>
    </div>

    <div class="stats-bar" id="statsBar">
        <div class="loading-msg" style="grid-column:1/-1"><div class="spinner dark"></div></div>
    </div>

    <div class="filtros-wrap">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar links por nome, descrição ou URL..." oninput="filtrar()">
        </div>
        <div class="filtros-group" id="filtrosTipo">
            <button class="filtro-tipo active" data-tipo="todos" onclick="setTipo('todos',this)">Todos</button>
        </div>
        <div class="view-toggle">
            <button class="view-btn active" id="btnGrid" onclick="setView('grid')" title="Grade">⊞</button>
            <button class="view-btn" id="btnList" onclick="setView('lista')" title="Lista">≡</button>
        </div>
    </div>

    <div id="conteudo">
        <div class="loading-msg"><div class="spinner dark"></div> Carregando links...</div>
    </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)fecharModal()">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modalTitulo">Novo Link</div>
            <button class="modal-close" onclick="fecharModal()">✕</button>
        </div>
        <div class="modal-body" style="padding:20px 24px">
            <input type="hidden" id="editId">
            <div class="form-group" style="margin-bottom:16px">
                <label class="form-label">Nome do Link *</label>
                <input type="text" class="form-input" id="fNome" placeholder="Ex: Manual de Jurídico">
            </div>
            <div class="form-group" style="margin-bottom:16px">
                <label class="form-label">URL *</label>
                <input type="text" class="form-input" id="fUrl" placeholder="https://..." oninput="autoTipo()">
            </div>
            <div class="form-row" style="margin-bottom:16px">
                <div class="form-group">
                    <label class="form-label">Tipo</label>
                    <select class="form-select" id="fTipoSelect" onchange="onTipoSelectChange()">
                        <option value="sistema">⚙️ Sistema</option>
                        <option value="planilha">📊 Planilha</option>
                        <option value="manual">📘 Manual</option>
                        <option value="drive">📁 Drive</option>
                        <option value="apresentacao">📑 Apresentação</option>
                        <option value="formulario">📋 Formulário</option>
                        <option value="link">🔗 Link</option>
                        <option value="outros">✏️ Outro (digitar)...</option>
                    </select>
                    <input type="text" class="form-input" id="fTipoCustom" placeholder="Digite o tipo..." style="display:none;margin-top:6px">
                    <input type="hidden" id="fTipo">
                </div>
                <div class="form-group">
                    <label class="form-label">Grupo</label>
                    <select class="form-select" id="fGrupoSelect" onchange="onGrupoSelectChange()"></select>
                    <input type="text" class="form-input" id="fGrupoCustom" placeholder="Nome do grupo..." style="display:none;margin-top:6px">
                    <input type="hidden" id="fGrupo">
                </div>
            </div>
            <div class="form-group" style="margin-bottom:16px">
                <label class="form-label">Descrição</label>
                <input type="text" class="form-input" id="fDesc" placeholder="Breve descrição do link">
            </div>
        </div>
        <div class="modal-footer" style="padding:0 24px 20px">
            <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
            <button class="btn btn-td" id="btnSalvar" onclick="salvarLink()">💾 Salvar</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = '/juridico/links-api';

async function apiFetch(url, opts) {
    opts = opts || {};
    var r = await fetch(url, opts);
    if (r.status === 401) { alert('Sessão expirada.'); location.href = '/login'; return null; }
    return r.json();
}

var TODOS_LINKS   = [];
var GRUPOS        = {};
var tipoFiltro    = 'todos';
var textoBusca    = '';
var viewMode      = 'grid';
var gruposAbertos = {};

var TIPO_CFG = {
    sistema:      { icon:'⚙️',  label:'Sistema',      badge:'badge-sistema'      },
    planilha:     { icon:'📊',  label:'Planilha',     badge:'badge-planilha'     },
    manual:       { icon:'📘',  label:'Manual',       badge:'badge-manual'       },
    drive:        { icon:'📁',  label:'Drive',        badge:'badge-drive'        },
    apresentacao: { icon:'📑',  label:'Apresentação', badge:'badge-apresentacao' },
    formulario:   { icon:'📋',  label:'Formulário',   badge:'badge-formulario'   },
    link:         { icon:'🔗',  label:'Link',         badge:'badge-link'         },
};
function tipoInfo(t){ return TIPO_CFG[t] || { icon:'🔗', label:t, badge:'badge-link' }; }

var toast = function(msg, ms){ ms=ms||2500; var el=$('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(function(){ el.classList.remove('show'); }, ms); };
var setStatus = function(cls, msg){ $('sdot').className='sdot '+cls; $('statusText').textContent=msg; };
function $(id){ return document.getElementById(id); }

function onTipoSelectChange(){
    var sel=$('fTipoSelect'), custom=$('fTipoCustom');
    if(sel.value==='outros'){ custom.style.display='block'; custom.focus(); $('fTipo').value=''; }
    else { custom.style.display='none'; custom.value=''; $('fTipo').value=sel.value; }
}
function onGrupoSelectChange(){
    var sel=$('fGrupoSelect'), custom=$('fGrupoCustom');
    if(sel.value==='__novo__'){ custom.style.display='block'; custom.focus(); $('fGrupo').value=''; }
    else { custom.style.display='none'; custom.value=''; $('fGrupo').value=sel.value; }
}
document.addEventListener('DOMContentLoaded', function(){
    var c=$('fTipoCustom'); if(c) c.addEventListener('input', function(){ $('fTipo').value=c.value.trim().toLowerCase(); });
    var gc=$('fGrupoCustom'); if(gc) gc.addEventListener('input', function(){ $('fGrupo').value=gc.value.trim(); });
});
function autoTipo(){
    var url=($('fUrl').value||'').toLowerCase(), sel=$('fTipoSelect');
    if(!sel||( sel.value && sel.value!=='link')) return;
    if(url.includes('docs.google.com/spreadsheets'))      sel.value='planilha';
    else if(url.includes('docs.google.com/document'))     sel.value='manual';
    else if(url.includes('docs.google.com/presentation')) sel.value='apresentacao';
    else if(url.includes('docs.google.com/forms'))        sel.value='formulario';
    else if(url.includes('drive.google.com'))             sel.value='drive';
    onTipoSelectChange();
}

async function carregar(){
    setStatus('syncing','Carregando links...');
    try {
        var d = await apiFetch(API_BASE, {
            headers: { 'Accept': 'application/json' }
        });
        if(!d) return;
        if(!d.ok) throw new Error(d.erro||'Erro ao carregar');
        TODOS_LINKS = d.links||[];
        GRUPOS      = d.grupos||{};
        Object.keys(GRUPOS).forEach(function(g){ gruposAbertos[g]=true; });
        setStatus('ready','✓ '+TODOS_LINKS.length+' links · planilha sincronizada');
        $('sheetsBadge').style.display   = 'flex';
        $('sheetsInfoBar').style.display = 'flex';
        $('sheetsTotal').textContent     = TODOS_LINKS.length+' links';
        $('pageSub').textContent         = TODOS_LINKS.length+' links · '+Object.keys(GRUPOS).length+' grupos · Google Sheets';
        $('lastSync').textContent        = 'Atualizado: '+new Date().toLocaleTimeString('pt-BR');
        renderStats(); renderFiltros(); renderConteudo(); popularGruposSugestoes();
    } catch(e){
        setStatus('error','❌ '+e.message);
        $('conteudo').innerHTML='<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">Erro ao carregar links</div><div class="empty-state-sub">'+e.message+'</div></div>';
    }
}

function renderStats(){
    var conts={};
    TODOS_LINKS.forEach(function(l){ var t=l.tipo||'link'; conts[t]=(conts[t]||0)+1; });
    var html='<div class="stat-pill" style="border-color:rgba(124,58,237,.3)"><div class="stat-val" style="color:var(--jur)">'+TODOS_LINKS.length+'</div><div class="stat-lbl">Total</div></div>';
    ['sistema','planilha','manual','drive','apresentacao','formulario','link'].forEach(function(t){
        if(!conts[t]) return;
        var cfg=tipoInfo(t);
        html+='<div class="stat-pill"><div class="stat-val" style="color:var(--jur)">'+conts[t]+'</div><div class="stat-lbl">'+cfg.icon+' '+cfg.label+'</div></div>';
    });
    html+='<div class="stat-pill" style="border-color:rgba(22,163,74,.3)"><div class="stat-val" style="color:var(--green)">'+Object.keys(GRUPOS).length+'</div><div class="stat-lbl">Grupos</div></div>';
    $('statsBar').innerHTML=html;
}

function renderFiltros(){
    var conts={};
    TODOS_LINKS.forEach(function(l){ var t=l.tipo||'link'; conts[t]=(conts[t]||0)+1; });
    var el=$('filtrosTipo');
    el.innerHTML='<button class="filtro-tipo'+(tipoFiltro==='todos'?' active':'')+'" onclick="setTipo(\'todos\',this)">Todos <span class="count-badge">'+TODOS_LINKS.length+'</span></button>';
    ['sistema','planilha','manual','drive','apresentacao','formulario'].forEach(function(t){
        if(!conts[t]) return;
        var cfg=tipoInfo(t);
        el.innerHTML+='<button class="filtro-tipo'+(tipoFiltro===t?' active':'')+'" onclick="setTipo(\''+t+'\',this)">'+cfg.icon+' '+cfg.label+' <span class="count-badge">'+conts[t]+'</span></button>';
    });
}

function setTipo(tipo, btn){ tipoFiltro=tipo; document.querySelectorAll('.filtro-tipo').forEach(function(b){ b.classList.remove('active'); }); btn.classList.add('active'); renderConteudo(); }
function filtrar(){ textoBusca=($('searchInput').value||'').toLowerCase().trim(); renderConteudo(); }

function linksFiltrados(){
    return TODOS_LINKS.filter(function(l){
        var matchTipo  = tipoFiltro==='todos'||l.tipo===tipoFiltro;
        var matchBusca = !textoBusca||(l.nome||'').toLowerCase().includes(textoBusca)||(l.descricao||'').toLowerCase().includes(textoBusca)||(l.url||'').toLowerCase().includes(textoBusca)||(l.grupo||'').toLowerCase().includes(textoBusca);
        return matchTipo&&matchBusca;
    });
}

function renderConteudo(){
    var lista=linksFiltrados();
    if(!lista.length){ $('conteudo').innerHTML='<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">Nenhum link encontrado</div><div class="empty-state-sub">Tente outro filtro ou termo de busca</div></div>'; return; }
    if(viewMode==='lista'){ renderLista(lista); return; }
    renderGrade(lista);
}

function renderGrade(lista){
    var gruposVisiveis={};
    lista.forEach(function(l){ var g=l.grupo||'Outros'; if(!gruposVisiveis[g]) gruposVisiveis[g]=[]; gruposVisiveis[g].push(l); });
    var html='<div class="grupos-container">';
    Object.keys(gruposVisiveis).sort().forEach(function(grupo){
        var itens=gruposVisiveis[grupo], aberto=gruposAbertos[grupo]!==false;
        html+='<div class="grupo-section"><div class="grupo-header" onclick="toggleGrupo(\''+esc(grupo)+'\')"><div class="grupo-header-left"><span class="grupo-arrow '+(aberto?'aberto':'')+'" id="arrow-'+esc(grupo)+'">▶</span><span class="grupo-title">'+esc(grupo)+'</span><span class="grupo-count">'+itens.length+'</span></div></div>';
        html+='<div class="grupo-body '+(aberto?'':'fechado')+'" id="body-'+esc(grupo)+'">';
        itens.forEach(function(l){ html+=cardHtml(l); });
        html+='</div></div>';
    });
    html+='</div>';
    $('conteudo').innerHTML=html;
}

function renderLista(lista){
    var html='<div class="lista-wrap">';
    lista.forEach(function(l){
        var cfg=tipoInfo(l.tipo||'link');
        html+='<div class="lista-row"><span class="lista-icon">'+cfg.icon+'</span><span class="lista-nome" title="'+esc(l.nome)+'">'+esc(l.nome)+'</span><span class="lista-grupo">'+esc(l.grupo||'Outros')+'</span><span class="link-tipo-badge '+cfg.badge+'">'+cfg.label+'</span><div class="lista-actions"><a href="'+esc(l.url)+'" target="_blank" class="link-action-btn">🔗</a><button class="link-action-btn" onclick="copiarLink(\''+esc(l.url)+'\')">📋</button><button class="link-action-btn" onclick="abrirModalEditar('+l.id+')">✏️</button><button class="link-action-btn del" onclick="deletarLink('+l.id+')">🗑️</button></div></div>';
    });
    html+='</div>';
    $('conteudo').innerHTML=html;
}

function cardHtml(l){
    var cfg=tipoInfo(l.tipo||'link');
    var urlCurta=(l.url||'').replace(/^https?:\/\/(www\.)?/,'').substring(0,48);
    return '<div class="link-card tipo-'+(l.tipo||'link')+'"><div class="link-card-top"><span class="link-tipo-icon">'+cfg.icon+'</span><div class="link-card-info"><div class="link-card-nome">'+esc(l.nome)+'</div>'+(l.descricao?'<div class="link-card-desc">'+esc(l.descricao)+'</div>':'')+'</div><div class="link-card-actions"><a href="'+esc(l.url)+'" target="_blank" class="link-action-btn">🔗</a><button class="link-action-btn" onclick="copiarLink(\''+esc(l.url)+'\')">📋</button><button class="link-action-btn" onclick="abrirModalEditar('+l.id+')">✏️</button><button class="link-action-btn del" onclick="deletarLink('+l.id+')">🗑️</button></div></div><div class="link-card-footer"><span class="link-tipo-badge '+cfg.badge+'">'+cfg.label+'</span><span class="link-url-mini" title="'+esc(l.url)+'">'+esc(urlCurta)+'</span></div></div>';
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function toggleGrupo(grupo){
    gruposAbertos[grupo]=!gruposAbertos[grupo];
    var body=document.getElementById('body-'+grupo), arrow=document.getElementById('arrow-'+grupo);
    if(body)  body.classList.toggle('fechado',!gruposAbertos[grupo]);
    if(arrow) arrow.classList.toggle('aberto', gruposAbertos[grupo]);
}

function setView(modo){ viewMode=modo; $('btnGrid').classList.toggle('active',modo==='grid'); $('btnList').classList.toggle('active',modo==='lista'); renderConteudo(); }

function popularGrupoSelect(valorAtual){
    var sel=$('fGrupoSelect'), grupos=Object.keys(GRUPOS).sort();
    var html=grupos.map(function(g){ return '<option value="'+esc(g)+'"'+(g===valorAtual?' selected':'')+'>'+esc(g)+'</option>'; }).join('');
    var isCustom=valorAtual&&!grupos.includes(valorAtual);
    html+='<option value="__novo__"'+(isCustom?' selected':'')+'>✏️ Novo grupo (digitar)...</option>';
    sel.innerHTML=html;
    var custom=$('fGrupoCustom');
    if(isCustom){ custom.style.display='block'; custom.value=valorAtual; $('fGrupo').value=valorAtual; }
    else { custom.style.display='none'; custom.value=''; $('fGrupo').value=valorAtual||(grupos[0]||''); if(!isCustom&&grupos.length>0&&!valorAtual){ sel.value=grupos[0]; $('fGrupo').value=grupos[0]; } }
}

function popularGruposSugestoes(){
    var tiposFixos=['sistema','planilha','manual','drive','apresentacao','formulario','link','outros'];
    var tiposExistentes=TODOS_LINKS.map(function(l){ return (l.tipo||'link').toLowerCase(); }).filter(function(t,i,arr){ return arr.indexOf(t)===i&&!tiposFixos.includes(t); }).sort();
    var sel=$('fTipoSelect');
    var outrosIdx=Array.from(sel.options).findIndex(function(o){ return o.value==='outros'; });
    while(sel.options.length>outrosIdx+1) sel.remove(outrosIdx+1);
    tiposExistentes.forEach(function(t){ var opt=document.createElement('option'); opt.value=t; opt.textContent='🏷️ '+t.charAt(0).toUpperCase()+t.slice(1); sel.insertBefore(opt,sel.options[outrosIdx]); });
}

function abrirModal(){
    $('editId').value=''; $('fNome').value=''; $('fUrl').value=''; $('fTipo').value='link'; $('fTipoSelect').value='link';
    $('fTipoCustom').value=''; $('fTipoCustom').style.display='none';
    $('fGrupo').value=''; $('fGrupoCustom').value=''; $('fGrupoCustom').style.display='none';
    popularGrupoSelect(''); $('fDesc').value='';
    $('modalTitulo').textContent='Novo Link';
    $('modalOverlay').classList.add('open');
    setTimeout(function(){ $('fNome').focus(); },100);
}

function abrirModalEditar(id){
    var l=TODOS_LINKS.find(function(x){ return x.id===id; }); if(!l) return;
    $('editId').value=l.id; $('fNome').value=l.nome||''; $('fUrl').value=l.url||''; $('fDesc').value=l.descricao||'';
    var tiposFixos=['sistema','planilha','manual','drive','apresentacao','formulario','link'];
    var tipoVal=(l.tipo||'link').toLowerCase();
    $('fTipo').value=tipoVal;
    if(tiposFixos.includes(tipoVal)){ $('fTipoSelect').value=tipoVal; $('fTipoCustom').value=''; $('fTipoCustom').style.display='none'; }
    else { $('fTipoSelect').value='outros'; $('fTipoCustom').value=tipoVal; $('fTipoCustom').style.display='block'; }
    popularGrupoSelect(l.grupo||''); $('fGrupo').value=l.grupo||'';
    $('modalTitulo').textContent='Editar Link';
    $('modalOverlay').classList.add('open');
    setTimeout(function(){ $('fNome').focus(); },100);
}

function fecharModal(){ $('modalOverlay').classList.remove('open'); }

function salvarLink(){
    var nome=($('fNome').value||'').trim(), url=($('fUrl').value||'').trim();
    if(!nome||!url){ toast('⚠️ Nome e URL são obrigatórios'); return; }
    var id=$('editId').value;
    var body={ nome:nome, url:url, tipo:($('fTipo').value||'link').trim().toLowerCase(), grupo:($('fGrupo').value||'Outros').trim(), descricao:($('fDesc').value||'').trim() };
    var btn=$('btnSalvar');
    btn.disabled=true; btn.innerHTML='<div class="spinner"></div> Salvando...';
    var method=id?'PATCH':'POST', endpoint=id?API_BASE+'/'+id:API_BASE+'/';
    apiFetch(endpoint,{ method:method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
        .then(function(d){ if(!d) return; if(!d.ok) throw new Error(d.erro||'Erro'); toast(id?'✅ Link atualizado!':'✅ Link criado!'); fecharModal(); carregar(); })
        .catch(function(e){ toast('❌ '+e.message); })
        .finally(function(){ btn.disabled=false; btn.innerHTML='💾 Salvar'; });
}

function deletarLink(id){
    var l=TODOS_LINKS.find(function(x){ return x.id===id; });
    if(!confirm('Excluir "'+( l?l.nome:id)+'"? Remove também da planilha.')) return;
    apiFetch(API_BASE+'/'+id,{ method:'DELETE' })
        .then(function(d){ if(!d) return; if(!d.ok) throw new Error(d.erro||'Erro'); toast('🗑️ Link excluído'); carregar(); })
        .catch(function(e){ toast('❌ '+e.message); });
}

function copiarLink(url){ navigator.clipboard.writeText(url).then(function(){ toast('📋 URL copiada!',1800); }).catch(function(){ toast('❌ Não foi possível copiar'); }); }

async function sincronizar(){
    var btn=$('btnSync');
    btn.disabled=true; btn.innerHTML='<div class="spinner"></div> Sincronizando...';
    setStatus('syncing','🔄 Sincronizando com Google Sheets...');
    try {
        var d=await apiFetch(API_BASE+'/sincronizar',{ method:'POST' });
        if(!d) return;
        toast('✅ '+(d.msg||d.total+' links na planilha'),3500);
        await carregar();
    } catch(e){ toast('❌ '+e.message,4000); setStatus('error','❌ Erro na sincronização'); }
    finally { btn.disabled=false; btn.innerHTML='🔄 Sincronizar'; }
}

document.addEventListener('keydown', function(e){ if(e.key==='Escape') fecharModal(); if(e.key==='Enter'&&$('modalOverlay').classList.contains('open')) salvarLink(); });

carregar();
</script>
